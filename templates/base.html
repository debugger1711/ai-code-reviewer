<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Reviewer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">
    
    <nav class="bg-gray-900 shadow-xl border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                
                <div class="flex-shrink-0">
                    <a href="{% url 'home' %}" class="text-2xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-green-400 animate-pulse">
                        &lt;AI Code Reviewer /&gt;
                    </a>
                </div>

               <div class="hidden md:flex space-x-8">
                    <a href="{% url 'home' %}" class="text-white hover:text-blue-400 px-3 py-2 rounded-md text-sm font-medium transition-colors">Home</a>
                    <a href="{% url 'history' %}" class="text-gray-300 hover:text-blue-400 px-3 py-2 rounded-md text-sm font-medium transition-colors">History</a>
                    <a href="{% url 'about' %}" class="text-gray-300 hover:text-blue-400 px-3 py-2 rounded-md text-sm font-medium transition-colors">About</a>
                    <a href="{% url 'contact' %}" class="text-gray-300 hover:text-blue-400 px-3 py-2 rounded-md text-sm font-medium transition-colors">Contact</a>
                </div>

                <div class="hidden md:block">
                    <div class="flex items-center space-x-2 bg-gray-800 px-4 py-2 rounded-full border border-gray-700 shadow-inner">
                        <span class="text-xl">👨‍💻</span>
                        <span class="text-green-400 font-bold text-sm tracking-wide">Welcome, Vishal Kumar!</span>
                    </div>
                </div>

            </div>
        </div>
    </nav>
    <div class="container mx-auto p-4 mt-6">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
