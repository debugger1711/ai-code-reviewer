{% extends 'base.html' %} {% block content %}
<div class="bg-white p-6 rounded-lg shadow-md max-w-2xl mx-auto">
    <h2 class="text-2xl font-bold mb-4">Submit Your Code</h2>
    
    <form method="POST" action="">
        {% csrf_token %} <label class="block text-gray-700 font-bold mb-2">Code Snippet:</label>
        <textarea name="code_input" rows="8" class="w-full border rounded p-2 mb-4" placeholder="Paste your python code here..."></textarea>
        
        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
            Analyze Code
        </button>
    </form>
</div>
{% endblock %}
